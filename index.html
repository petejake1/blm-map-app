<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Lands Explorer - BLM, USFS, NPS, Wilderness & Trails</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; overflow:hidden; }
    #map { height: calc(100vh - 64px); width:100%; }
    .dark .leaflet-tile { filter: brightness(0.65) invert(0.95) contrast(1.1) hue-rotate(200deg) saturate(0.4); }
    .sidebar { max-height: calc(100vh - 200px); overflow-y: auto; }
    #suggestions { position: absolute; z-index: 1000; background: #18181b; border: 1px solid #3f3f46; max-height: 240px; overflow-y: auto; width:100%; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background: rgba(0,0,0,0.7); padding:1rem 2rem; border-radius:1rem; }
    @media (max-width: 768px) {
      #topbar { flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem; }
      #map { height: calc(100vh - 56px); }
      .sidebar-mobile { position: fixed; bottom: 0; left:0; right:0; height: 60%; background: #111; border-top: 3px solid #10b981; transform: translateY(100%); transition: transform 0.3s ease; z-index: 999; }
      .sidebar-mobile.open { transform: translateY(0); }
      button, input { font-size: 1rem; padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div class="flex flex-col h-screen">
    <!-- Top controls -->
    <div id="topbar" class="bg-zinc-900 border-b border-zinc-700 p-3 flex items-center gap-3 shadow-xl z-50 flex-wrap md:flex-nowrap">
      <h1 class="text-xl md:text-2xl font-bold text-emerald-400 flex-shrink-0">Lands Explorer</h1>

      <div class="relative flex-1 min-w-[200px] order-3 md:order-none">
        <div class="flex">
          <input id="placeSearch" type="text" placeholder="City/State" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-xl px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
          <button onclick="clearPlaceSearch()" class="bg-zinc-700 hover:bg-zinc-600 px-3 rounded-r-xl text-xl">✕</button>
        </div>
        <ul id="suggestions" class="hidden rounded-b-xl shadow-2xl text-sm"></ul>
      </div>

      <div class="flex-1 max-w-xs relative order-4 md:order-none">
        <div class="flex">
          <input id="searchInput" type="text" placeholder="Keyword..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-xl px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
          <button onclick="clearKeywordSearch()" class="bg-zinc-700 hover:bg-zinc-600 px-3 rounded-r-xl text-xl">✕</button>
        </div>
      </div>

      <button onclick="performSearch()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl font-semibold order-5 md:order-none">Search</button>

      <button onclick="toggleSettings()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm flex items-center gap-2 order-6 md:order-none">⚙️ Settings</button>

      <button onclick="goToMyLocation()" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-xl text-sm flex items-center gap-2 order-7 md:order-none">
        📍 My Location
      </button>

      <button id="sidebarToggle" class="md:hidden bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm order-1 ml-auto">☰ Results</button>

      <div class="flex items-center gap-3 ml-auto order-2 md:order-none">
        <label class="flex items-center gap-2 text-xs md:text-sm cursor-pointer">
          <input type="checkbox" id="autoRefresh" checked class="w-4 h-4 accent-emerald-500">
          <span>Auto</span>
        </label>
        <button onclick="toggleDarkMode()" id="themeBtn" class="bg-zinc-800 hover:bg-zinc-700 px-3 py-2 rounded-xl text-sm">🌙</button>
      </div>
    </div>

    <div class="flex flex-1 relative overflow-hidden">
      <!-- Sidebar / Bottom sheet -->
      <div id="sidebar" class="w-full md:w-80 bg-zinc-900 border-r border-zinc-700 flex flex-col sidebar-mobile md:static md:translate-y-0">
        <div class="p-4 border-b border-zinc-700 font-semibold text-emerald-400 flex justify-between items-center md:block">
          Results (<span id="resultCount">0</span>)
          <button onclick="exportToKML()" class="text-xs text-amber-400 hover:text-amber-300 md:mt-2 block">Export KML</button>
        </div>
        <div id="resultsList" class="p-3 space-y-3 overflow-y-auto flex-1"></div>
      </div>

      <!-- Map -->
      <div class="flex-1 relative">
        <div id="map"></div>
        <div id="loading" class="hidden">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4">
    <div class="bg-zinc-900 rounded-3xl p-6 md:p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-emerald-400">Map Settings</h2>
        <button onclick="toggleSettings()" class="text-3xl">&times;</button>
      </div>

      <div class="space-y-8">
        <section>
          <h3 class="font-semibold mb-4 text-zinc-300 text-lg">Basemap</h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
            <!-- Filled by JS -->
          </div>
        </section>

        <section>
          <h3 class="font-semibold mb-4 text-zinc-300 text-lg">Overlays</h3>
          <div class="space-y-3">
            <label class="flex items-center gap-3 p-4 bg-zinc-800 rounded-2xl cursor-pointer hover:bg-zinc-700 transition">
              <input type="checkbox" id="usfsOverlay" onchange="toggleOverlay('usfs')" class="w-5 h-5 accent-emerald-500">
              <div>
                <div class="font-medium">USFS National Forests</div>
                <div class="text-xs text-zinc-400">Admin boundaries</div>
              </div>
            </label>

            <label class="flex items-center gap-3 p-4 bg-zinc-800 rounded-2xl cursor-pointer hover:bg-zinc-700 transition">
              <input type="checkbox" id="npsOverlay" onchange="toggleOverlay('nps')" class="w-5 h-5 accent-emerald-500">
              <div>
                <div class="font-medium">National Parks (NPS)</div>
                <div class="text-xs text-zinc-400">Park units</div>
              </div>
            </label>

            <label class="flex items-center gap-3 p-4 bg-zinc-800 rounded-2xl cursor-pointer hover:bg-zinc-700 transition">
              <input type="checkbox" id="wildernessOverlay" onchange="toggleOverlay('wilderness')" class="w-5 h-5 accent-emerald-500">
              <div>
                <div class="font-medium">Wilderness Areas</div>
                <div class="text-xs text-zinc-400">Designated wilderness</div>
              </div>
            </label>

            <label class="flex items-center gap-3 p-4 bg-zinc-800 rounded-2xl cursor-pointer hover:bg-zinc-700 transition">
              <input type="checkbox" id="npsTrailsOverlay" onchange="toggleOverlay('npsTrails')" class="w-5 h-5 accent-emerald-500">
              <div>
                <div class="font-medium">NPS Trails</div>
                <div class="text-xs text-zinc-400">Park trails & routes</div>
              </div>
            </label>
          </div>
        </section>
      </div>

      <button onclick="toggleSettings()" class="mt-8 w-full bg-emerald-700 hover:bg-emerald-600 py-3 rounded-2xl font-semibold">Close</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script>
    let map, geoLayer, clusterLayer, drawControl;
    let overlays = { usfs: null, nps: null, wilderness: null, npsTrails: null };
    let currentBasemapLayer;
    let allFeatures = [];
    let debounceTimer, suggestionDebounce;

    const basemaps = {
      osm: {name:"Streets (OSM)", url:"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", attr:"© OpenStreetMap", color:"#22c55e"},
      cartoPositron: {name:"Light (Carto)", url:"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", attr:"© Carto", color:"#f3f4f6"},
      cartoDark: {name:"Dark (Carto)", url:"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", attr:"© Carto", color:"#111827"},
      esriSatellite: {name:"Satellite (Esri)", url:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", attr:"© Esri", color:"#000"},
      esriTopo: {name:"Topo (Esri)", url:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", attr:"© Esri", color:"#4b5563"},
      openTopo: {name:"OpenTopo", url:"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", attr:"© OpenTopoMap", color:"#6b7280"},
      usgsTopo: {name:"USGS Topo", url:"https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}", attr:"© USGS", color:"#374151"},
      esriNatGeo: {name:"NatGeo", url:"https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}", attr:"© Esri", color:"#1e40af"},
      osmHot: {name:"Humanitarian", url:"https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png", attr:"© OSM HOT", color:"#ef4444"},
      esriStreets: {name:"Streets (Esri)", url:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}", attr:"© Esri", color:"#3b82f6"}
    };

    function initMap() {
      map = L.map('map').setView([44.9778, -93.2650], 10); // Start centered on Minneapolis
      currentBasemapLayer = L.tileLayer(basemaps.osm.url, {attribution: basemaps.osm.attr}).addTo(map);

      drawControl = new L.Control.Draw({ draw: {polygon:true, rectangle:true, marker:true, circle:false, polyline:true}, edit:{featureGroup: new L.FeatureGroup()} });
      map.addControl(drawControl);

      clusterLayer = L.markerClusterGroup();

      map.on('moveend', () => {
        if (document.getElementById('autoRefresh').checked) setTimeout(performSearch, 600);
      });

      buildBasemapGrid();
      performSearch();

      document.getElementById('sidebarToggle').onclick = () => {
        document.getElementById('sidebar').classList.toggle('open');
      };
    }

    function buildBasemapGrid() {
      const container = document.querySelector('#settingsModal section:first-child div');
      Object.entries(basemaps).forEach(([key, bm]) => {
        const div = document.createElement('div');
        div.className = `p-3 rounded-xl cursor-pointer border-2 transition text-center text-sm ${key === 'osm' ? 'border-emerald-500 bg-zinc-800' : 'border-transparent hover:border-emerald-700 hover:bg-zinc-800'}`;
        div.innerHTML = `<div class="w-10 h-10 mx-auto mb-2 rounded" style="background:${bm.color || '#000'}"></div>${bm.name}`;
        div.onclick = () => changeBasemap(key, div);
        container.appendChild(div);
      });
    }

    function changeBasemap(key, clickedDiv) {
      map.removeLayer(currentBasemapLayer);
      currentBasemapLayer = L.tileLayer(basemaps[key].url, {attribution: basemaps[key].attr}).addTo(map);
      document.querySelectorAll('#settingsModal section:first-child div > div').forEach(d => d.classList.remove('border-emerald-500', 'bg-zinc-800'));
      clickedDiv.classList.add('border-emerald-500', 'bg-zinc-800');
    }

    // Autocomplete (Nominatim) - focused on US
    const placeInput = document.getElementById('placeSearch');
    placeInput.addEventListener('input', () => {
      clearTimeout(suggestionDebounce);
      suggestionDebounce = setTimeout(async () => {
        const q = placeInput.value.trim();
        if (q.length < 3) return document.getElementById('suggestions').classList.add('hidden');
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=6&countrycodes=us&q=${encodeURIComponent(q)}`);
        const data = await res.json();
        const ul = document.getElementById('suggestions');
        ul.innerHTML = '';
        data.forEach(item => {
          const li = document.createElement('li');
          li.className = 'px-4 py-2 hover:bg-zinc-700 cursor-pointer';
          li.textContent = item.display_name;
          li.onclick = () => {
            placeInput.value = item.display_name;
            ul.classList.add('hidden');
            map.flyTo([parseFloat(item.lat), parseFloat(item.lon)], 10);
            setTimeout(performSearch, 1000);
          };
          ul.appendChild(li);
        });
        ul.classList.remove('hidden');
      }, 300);
    });

    function clearPlaceSearch() { document.getElementById('placeSearch').value = ''; document.getElementById('suggestions').classList.add('hidden'); }
    function clearKeywordSearch() { document.getElementById('searchInput').value = ''; }

    async function goToMyLocation() {
      if (!navigator.geolocation) return alert("Geolocation not supported by your browser.");
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          map.flyTo([lat, lon], 12);
          setTimeout(performSearch, 800);
          L.marker([lat, lon]).addTo(map).bindPopup("Your approximate location").openPopup();
        },
        err => alert("Couldn't get location: " + err.message + ". Check permissions?")
      );
    }

    async function performSearch() {
      document.getElementById('loading').classList.remove('hidden');
      const query = document.getElementById('searchInput').value.trim();
      const b = map.getBounds();
      const bbox = `${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()}`;
      let url = `https://gbp-blm-egis.hub.arcgis.com/api/search/v1/collections/dataset/items?limit=150&bbox=${bbox}`;
      if (query) url += `&q=${encodeURIComponent(query)}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        allFeatures = data.features || [];
        document.getElementById('resultCount').textContent = allFeatures.length;
        updateSidebar();
        renderFeatures();
      } catch(e) { console.error(e); }
      document.getElementById('loading').classList.add('hidden');
    }

    function renderFeatures() {
      if (geoLayer) map.removeLayer(geoLayer);
      clusterLayer.clearLayers();

      geoLayer = L.geoJSON({type:"FeatureCollection", features:allFeatures}, {
        style: {color:"#10b981", weight:2, fillOpacity:0.2},
        onEachFeature: (f, l) => {
          // Add popup logic from previous versions here if needed
        }
      });

      geoLayer.eachLayer(l => { if (l.getLatLng) clusterLayer.addLayer(l); });
      map.addLayer(clusterLayer);
    }

    async function toggleOverlay(type) {
      const checked = document.getElementById(type + 'Overlay').checked;
      if (!checked) { if (overlays[type]) map.removeLayer(overlays[type]); return; }

      if (overlays[type]) { map.addLayer(overlays[type]); return; }

      let url, style;
      if (type === 'usfs') {
        url = "https://apps.fs.usda.gov/arcx/rest/services/EDW/EDW_ForestAdminBoundaries_01/MapServer/0/query?where=1=1&outFields=FORESTNAME&f=geojson";
        style = {color: "#eab308", weight: 2, fillOpacity: 0.1};
      } else if (type === 'nps') {
        url = "https://carto.nationalmap.gov/arcgis/rest/services/govunits/MapServer/29/query?where=1=1&outFields=NAME&f=geojson";
        style = {color: "#ef4444", weight: 2.5, fillOpacity: 0.15, dashArray: '5'};
      } else if (type === 'wilderness') {
        url = "https://apps.fs.usda.gov/arcx/rest/services/EDW/EDW_Wilderness_01/MapServer/0/query?where=1=1&outFields=AREA_NAME&f=geojson";
        style = {color: "#8b5cf6", weight: 3, fillOpacity: 0.08, dashArray: '3 6'};
      } else if (type === 'npsTrails') {
        url = "https://mapservices.nps.gov/arcgis/rest/services/NationalDatasets/NPS_Public_Trails/MapServer/0/query?where=1=1&outFields=TRAIL_NAME&f=geojson";
        style = {color: "#f97316", weight: 2.5, opacity: 0.9, dashArray: '2 4'};
      }

      try {
        const res = await fetch(url);
        const geo = await res.json();
        overlays[type] = L.geoJSON(geo, {style: style}).addTo(map);
      } catch(e) {
        console.error("Failed to load overlay:", type, e);
        alert("Could not load " + type + " overlay. Check console for details.");
      }
    }

    function toggleSettings() {
      document.getElementById('settingsModal').classList.toggle('hidden');
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      document.getElementById('themeBtn').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
    }

    // Placeholder functions - copy full implementations from previous versions
    function updateSidebar() { /* implement as before */ }
    function exportToKML() { /* implement as before */ }

    window.onload = initMap;
  </script>
</body>
</html>
