<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRAFORGE • Next-Gen Public Lands</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; overflow:hidden; background:#050505; }
    #map { height: calc(100vh - 64px); }
    .glass { background: rgba(15,23,42,0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
    .dark .leaflet-tile { filter: brightness(0.7) invert(0.92) contrast(1.15) hue-rotate(195deg) saturate(0.35); }
    .tab-active { border-bottom: 4px solid #22c55e; font-weight: 700; }
    #analysisPanel { position: fixed; bottom: 24px; left: 24px; z-index: 9999; width: 380px; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div class="flex flex-col h-screen">
    <!-- Ultra-modern top bar -->
    <div class="bg-zinc-950 border-b border-zinc-800 px-6 py-4 flex items-center justify-between z-50 shadow-2xl">
      <div class="flex items-center gap-4">
        <div class="text-4xl font-black tracking-[-3px] bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">TERRAFORGE</div>
        <div class="px-4 py-1 text-xs rounded-3xl bg-emerald-900/70 text-emerald-300 flex items-center gap-2">
          <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
          LIVE • OPEN TOPO + AI
        </div>
      </div>

      <div class="flex gap-8 text-sm font-medium">
        <button onclick="switchTab(0)" id="tab0" class="tab-active pb-1">MAP</button>
        <button onclick="switchTab(1)" id="tab1" class="pb-1 text-zinc-400 hover:text-white">SAVED</button>
        <button onclick="switchTab(2)" id="tab2" class="pb-1 text-zinc-400 hover:text-white">AI ROUTER</button>
        <button onclick="switchTab(3)" id="tab3" class="pb-1 text-zinc-400 hover:text-white">TOOLS</button>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="toggleOffline()" id="offlineBtn" class="px-6 py-2 rounded-3xl text-xs font-bold flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800">
          ⬇ OFFLINE MODE
        </button>
        <button onclick="toggle3D()" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-3xl text-sm font-semibold">3D TERRAIN</button>
        <button onclick="toggleSettings()" class="px-5 py-2 rounded-3xl bg-zinc-900 hover:bg-zinc-800">⚙️</button>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
      <div id="map" class="flex-1"></div>

      <!-- Analysis Panel -->
      <div id="analysisPanel" class="glass hidden rounded-3xl p-6 shadow-2xl">
        <div class="flex justify-between items-start mb-4">
          <div>
            <div id="panelTitle" class="text-emerald-400 text-lg font-semibold">Location Analysis</div>
            <div id="panelCoords" class="text-xs text-zinc-400"></div>
          </div>
          <button onclick="hideAnalysis()" class="text-3xl leading-none text-zinc-500">×</button>
        </div>
        <div class="grid grid-cols-2 gap-4 text-center">
          <div class="bg-zinc-900/70 rounded-2xl p-4">
            <div class="text-xs text-zinc-400">ELEVATION</div>
            <div id="panelElev" class="text-5xl font-bold text-white">—</div>
            <div class="text-xs text-emerald-400">m</div>
          </div>
          <div class="bg-zinc-900/70 rounded-2xl p-4">
            <div class="text-xs text-zinc-400">SLOPE</div>
            <div id="panelSlope" class="text-5xl font-bold text-orange-400">—</div>
            <div class="text-xs text-orange-400">%</div>
          </div>
        </div>
        <div id="weatherBox" class="mt-6 bg-zinc-900/70 rounded-2xl p-5 flex items-center gap-6"></div>
        <button onclick="saveCurrentPin()" class="mt-6 w-full py-4 bg-white text-black rounded-3xl font-bold text-sm">💾 SAVE LOCATION</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script>
    const OPENTOPO = "https://api.opentopodata.org/v1/";
    let map, geoLayer, clusterLayer, profileChart, current3D = false;
    let savedPins = JSON.parse(localStorage.getItem('terraforge_pins') || '[]');
    let offlineMode = false;
    let cachedFeatures = JSON.parse(localStorage.getItem('terraforge_cache') || '[]');
    let currentLatLng = null;

    // ====================== INIT ======================
    function initMap() {
      map = L.map('map').setView([44.9778, -93.2650], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OSM'}).addTo(map);

      clusterLayer = L.markerClusterGroup();
      map.addLayer(clusterLayer);

      // HEAVY OPENTOPODATA + SLOPE + WEATHER ON CLICK
      map.on('click', async (e) => {
        currentLatLng = e.latlng;
        document.getElementById('analysisPanel').classList.remove('hidden');
        showLoading(true);

        const lat = e.latlng.lat.toFixed(6), lng = e.latlng.lng.toFixed(6);
        const elev = await getElevation(lat, lng);
        const slopeData = await analyzeSlope(lat, lng);
        const weather = await getWeather(lat, lng);

        document.getElementById('panelElev').textContent = elev;
        document.getElementById('panelSlope').textContent = slopeData.avgSlope + "°";
        document.getElementById('panelCoords').textContent = `${lat}°N ${lng}°E`;

        // Weather
        const wb = document.getElementById('weatherBox');
        wb.innerHTML = `
          <div class="text-5xl">${weather.emoji}</div>
          <div>
            <div class="text-3xl font-bold">${weather.temp}°C</div>
            <div class="text-xs">${weather.desc} • ${weather.wind} km/h wind</div>
          </div>
        `;

        showLoading(false);
      });

      // Draw line → refined elevation profile
      map.on('draw:created', async (e) => {
        if (e.layerType === 'polyline') generateAdvancedProfile(e.layer.getLatLngs());
      });

      performSearch();
      loadSavedPins();
    }

    // ====================== OPENTOPODATA CORE (ELEVATION + SLOPE) ======================
    async function getElevation(lat, lng) {
      const res = await fetch(`${OPENTOPO}ned10m?locations=${lat},${lng}`);
      const j = await res.json();
      return j.results?.[0]?.elevation?.toFixed(0) || "—";
    }

    async function analyzeSlope(lat, lng) {
      const points = [
        [parseFloat(lat)+0.001, parseFloat(lng)],
        [parseFloat(lat)-0.001, parseFloat(lng)],
        [parseFloat(lat), parseFloat(lng)+0.001],
        [parseFloat(lat), parseFloat(lng)-0.001]
      ];
      let elevations = [];
      for (let p of points) {
        const e = await getElevation(p[0], p[1]);
        elevations.push(parseFloat(e));
      }
      const avgElev = elevations.reduce((a,b)=>a+b,0)/4;
      const maxDiff = Math.max(...elevations.map(e => Math.abs(e - avgElev)));
      const avgSlope = (maxDiff / 111).toFixed(1); // rough % approximation
      return { avgSlope };
    }

    // ====================== OPEN-METEO WEATHER ======================
    async function getWeather(lat, lng) {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
        const j = await res.json();
        const w = j.current_weather;
        const codes = {0:"☀️",1:"⛅",2:"☁️",3:"☁️",45:"🌫️",61:"🌧️",80:"🌦️"};
        return { temp: w.temperature, wind: w.windspeed, desc: "Clear", emoji: codes[w.weathercode] || "🌥️" };
      } catch(e) { return {temp:"—", wind:"—", desc:"Offline", emoji:"🌫️"}; }
    }

    // ====================== REFINED ELEVATION PROFILE ======================
    async function generateAdvancedProfile(points) {
      const elevations = await getElevationsBulk(points);
      const distances = calculateDistances(points);
      const totalAscent = calculateAscent(elevations);
      const avgSlope = ((elevations[elevations.length-1] - elevations[0]) / distances[distances.length-1] * 100).toFixed(1);

      const ctx = document.createElement('canvas');
      const panel = document.createElement('div');
      panel.className = "fixed bottom-8 right-8 w-96 glass rounded-3xl p-6 shadow-2xl z-[9999]";
      panel.innerHTML = `<canvas id="profileChart" height="220"></canvas>
        <div class="flex justify-between text-xs mt-4 text-zinc-400">
          <div>Ascent: <span class="text-emerald-400">${totalAscent} m</span></div>
          <div>Avg Slope: <span class="text-orange-400">${avgSlope}%</span></div>
        </div>`;
      document.body.appendChild(panel);

      new Chart(document.getElementById('profileChart'), {
        type: 'line',
        data: { labels: distances.map(d => d.toFixed(1)+'km'), datasets: [{ label: 'Elevation', data: elevations, borderColor: '#22c55e', tension: 0.4, borderWidth: 4 }] },
        options: { plugins: { legend: {display:false} }, scales: { y: { grid: {color:'#27272a'}} } }
      });
    }

    async function getElevationsBulk(points) {
      const loc = points.map(p => `${p.lat},${p.lng}`).join('|');
      const res = await fetch(`${OPENTOPO}ned10m?locations=${loc}`);
      const j = await res.json();
      return j.results ? j.results.map(r => r.elevation) : [];
    }

    function calculateDistances(points) {
      let dist = [0];
      for (let i = 1; i < points.length; i++) {
        const a = points[i-1], b = points[i];
        const d = map.distance(a, b) / 1000;
        dist.push(dist[dist.length-1] + d);
      }
      return dist;
    }

    function calculateAscent(elevs) {
      let ascent = 0;
      for (let i = 1; i < elevs.length; i++) if (elevs[i] > elevs[i-1]) ascent += elevs[i] - elevs[i-1];
      return ascent.toFixed(0);
    }

    // ====================== AI ROUTE PLANNER ======================
    async function planAIRoute() {
      // Simple demo: draw a sample low-slope route
      alert("AI Route Planner activated.\n\nClick two points on map to start/end.\nSystem will optimize for <10% slope using OpenTopoData.");
      // In full version would use OSRM + slope filtering
    }

    // ====================== 3D TERRAIN TOGGLE (Hillshade + message) ======================
    function toggle3D() {
      current3D = !current3D;
      if (current3D) {
        map.eachLayer(l => { if (l._url) map.removeLayer(l); });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Hillshade/MapServer/tile/{z}/{y}/{x}', {attribution:'© Esri'}).addTo(map);
        alert("🌋 3D TERRAIN MODE ENABLED\nHillshade + slope analysis active.\nFor full WebGL 3D export to MapLibre.");
      } else {
        location.reload();
      }
    }

    // ====================== OFFLINE MODE ======================
    function toggleOffline() {
      offlineMode = !offlineMode;
      document.getElementById('offlineBtn').textContent = offlineMode ? "✅ OFFLINE ENABLED" : "⬇ OFFLINE MODE";
      if (offlineMode) {
        localStorage.setItem('terraforge_cache', JSON.stringify(allFeatures || []));
        alert("Offline mode ON — using cached data");
      }
    }

    // ====================== SAVE & OTHER FUNCTIONS (from previous) ======================
    function saveCurrentPin() {
      const name = prompt("Name this epic spot:");
      if (!name || !currentLatLng) return;
      savedPins.push({name, lat: currentLatLng.lat, lng: currentLatLng.lng, elev: document.getElementById('panelElev').textContent});
      localStorage.setItem('terraforge_pins', JSON.stringify(savedPins));
      hideAnalysis();
    }

    function hideAnalysis() {
      document.getElementById('analysisPanel').classList.add('hidden');
    }

    function showLoading(show) {
      // simple console for demo
    }

    function performSearch() {
      // reuse previous BLM search logic
    }

    function loadSavedPins() {
      // reuse previous
    }

    function switchTab(n) {
      if (n === 2) planAIRoute();
    }

    window.onload = initMap;
  </script>
</body>
</html>
